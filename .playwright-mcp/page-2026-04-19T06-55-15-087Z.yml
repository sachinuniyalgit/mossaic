        - img [ref=e62]
        - heading "Integrated Knowledge Hub" [level=3] [ref=e64]
        - paragraph [ref=e65]: We don't just study mountains — we synthesise ecological, social, and economic data to support integrated development strategies that actually work.
      - article [ref=e66]:
        - img [ref=e68]
        - heading "Community-Led Stewardship" [level=3] [ref=e71]
        - paragraph [ref=e72]: Resilience is built from the ground up. We strengthen local institutions by valuing traditional knowledge systems alongside scientific data.
      - article [ref=e73]:
        - img [ref=e75]
        - heading "Climate & Biodiversity Advocacy" [level=3] [ref=e77]
        - paragraph [ref=e78]: We serve as a global voice for mountain regions, ensuring that critical issues — from glacier retreat to forest health — are placed at the heart of international climate policy.
      - article [ref=e79]:
        - img [ref=e81]
        - heading "Evidence-Based Action" [level=3] [ref=e85]
        - paragraph [ref=e86]: Every project we undertake is a living laboratory, providing the data needed to scale practical solutions across the entire Himalayan range.
