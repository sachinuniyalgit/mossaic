      - paragraph [ref=e28]: Who We Are
      - paragraph [ref=e29]: A policy-action-research startup founded by a team of young researchers, deeply rooted in the mountain landscapes they study.
    - paragraph [ref=e31]: We work to strengthen local capacities, inform evidence-based policy, and foster sustainable, just, and resilient development across fragile mountain ecosystems.
  - generic [ref=e33]:
    - generic [ref=e34]:
      - paragraph [ref=e35]: Overview
      - heading "At a Glance" [level=2] [ref=e36]
    - generic [ref=e37]:
      - article [ref=e38]:
        - generic [ref=e39]: "01"
        - heading "Who We Are" [level=3] [ref=e40]
        - paragraph [ref=e41]: A transdisciplinary team of scientists, researchers, and local practitioners dedicated to the Integrated Development of mountain regions. We believe the most effective solutions for the Himalayas are those co-developed with the people who call them home.
      - article [ref=e42]:
        - generic [ref=e43]: "02"
        - heading "What We Do" [level=3] [ref=e44]
        - paragraph [ref=e45]: We transform place-based research into actionable policy and resilient infrastructure. Our work focuses on the intersection of ecological health, water security, and disaster risk reduction.
      - article [ref=e46]:
        - generic [ref=e47]: "03"
        - heading "Our Vision" [level=3] [ref=e48]
        - paragraph [ref=e49]: A future where mountain regions are ecologically secure, socially inclusive, and economically resilient — supported by informed policies, empowered communities, and the sustainable use of land, water, energy, and indigenous knowledge systems.
      - article [ref=e50]:
        - generic [ref=e51]: "04"
        - heading "Where We Work" [level=3] [ref=e52]
        - paragraph [ref=e53]: We operate across the fragile landscapes of the Indian Himalayan Region, focusing on hotspots of vulnerability where environmental degradation and social migration intersect.
  - generic [ref=e55]:
    - generic [ref=e56]:
      - paragraph [ref=e57]: Why It Matters
      - heading "Strategic Pillars" [level=2] [ref=e58]
    - generic [ref=e59]:
